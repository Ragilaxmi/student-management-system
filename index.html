
<!DOCTYPE html>
<html>
<head>
<title>Student Management System</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(to right,#7ec8e3,#6fa8dc);
margin:0;
padding:0;
}

.container{
width:80%;
margin:40px auto;
background:white;
padding:30px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:30px;
}

.add-btn{
background:green;
color:white;
padding:10px 18px;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2c3e50;
color:white;
padding:12px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

.delete-btn{
background:#e74c3c;
color:white;
border:none;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

</style>
</head>
